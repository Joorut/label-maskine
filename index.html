<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flyttegods Label Maskine</title>
  <meta name="theme-color" content="#1b3a6b" />
  <meta name="app-manifest" content="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      background: #1b3a6b;
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    header h1 { font-size: 1.5rem; letter-spacing: .5px; }
    header span { font-size: .9rem; opacity: .75; margin-left: auto; }

    /* ── Input panel ──────────────────────────────────────── */
    .panel {
      background: #fff;
      border-radius: 10px;
      padding: 28px 32px;
      margin: 28px auto;
      max-width: 680px;
      box-shadow: 0 2px 12px rgba(0,0,0,.10);
    }
    .panel h2 { font-size: 1.1rem; margin-bottom: 20px; color: #1b3a6b; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
    }
    .form-grid .full { grid-column: 1 / -1; }

    label { display: block; font-size: .8rem; font-weight: 700; margin-bottom: 5px; color: #444; text-transform: uppercase; letter-spacing: .4px; }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ccd2dc;
      border-radius: 6px;
      font-size: 1rem;
      font-family: Arial, sans-serif;
      transition: border-color .2s;
    }
    input:focus { outline: none; border-color: #1b3a6b; }

    .btn-row { display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap; }

    button {
      padding: 11px 26px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: Arial, sans-serif;
      transition: filter .15s, transform .1s;
    }
    button:active { transform: scale(.97); }

    #btn-generate { background: #1b3a6b; color: #fff; }
    #btn-generate:hover { filter: brightness(1.15); }

    #btn-mail { background: #2e7d32; color: #fff; }
    #btn-mail:hover { filter: brightness(1.12); }

    #btn-pdf { background: #005fa3; color: #fff; }
    #btn-pdf:hover { filter: brightness(1.12); }
    #btn-pdf:disabled { background: #aaa; cursor: not-allowed; }

    #btn-clear { background: #eee; color: #555; }
    #btn-clear:hover { background: #ddd; }

    /* PWA install gate */
    #pwa-install-gate {
      position: fixed;
      inset: 0;
      background: rgba(12, 19, 32, 0.82);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #pwa-install-gate.show { display: flex; }
    .pwa-card {
      width: min(560px, 95vw);
      background: #ffffff;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.35);
    }
    .pwa-card h3 {
      font-size: 1.15rem;
      margin-bottom: 8px;
      color: #1b3a6b;
    }
    .pwa-card p {
      font-size: 0.96rem;
      color: #333;
      line-height: 1.4;
      margin-bottom: 14px;
    }
    .pwa-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    #btn-install-pwa {
      background: #1b3a6b;
      color: #fff;
    }
    #btn-install-pwa:hover { filter: brightness(1.1); }
    #btn-install-help {
      background: #e8edf5;
      color: #21324e;
    }
    #btn-install-help:hover { filter: brightness(0.97); }

    body.standalone #pwa-install-gate { display: none !important; }

    /* Standalone mode: lock app UI to fixed window-like size */
    :root {
      --app-fixed-width: 560px;
      --app-fixed-height: 540px;
    }

    html.standalone-root {
      background: #1b3a6b;
    }

    body.standalone {
      width: var(--app-fixed-width);
      height: var(--app-fixed-height);
      min-height: var(--app-fixed-height);
      margin: 0 auto;
      overflow: hidden;
      background: #f0f2f5;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.2);
    }

    body.standalone header {
      padding: 16px 22px;
    }

    body.standalone .panel {
      width: calc(var(--app-fixed-width) - 28px);
      max-width: none;
      margin: 12px auto;
      padding: 20px 22px;
      max-height: calc(var(--app-fixed-height) - 112px);
      overflow: auto;
    }

    /* ── Label grid (screen) ──────────────────────────────── */
    #label-area {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto 48px;
      padding: 0 28px;
    }

    /* ── Single label ─────────────────────────────────────── */
    .label {
      width: 100%;
      aspect-ratio: 15 / 10;          /* 15cm wide × 10cm tall */
      border: 2.5px solid #111;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      background: #fff;
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
    }

    /* Label header with logo and address */
    .label-header {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 12px;
      padding: 8px 12px 6px;
      border-bottom: 1px solid #222;
      background: #fff;
    }
    .label-header-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-width: 0;
      flex: 1;
    }
    .label-logo {
      display: block;
      width: 140px;
      height: auto;
      object-fit: contain;
      flex: 0 0 auto;
    }
    .label-booking-header {
      font-size: 1.8rem;
      font-weight: 900;
      line-height: 1.1;
      color: #111;
      text-transform: uppercase;
      letter-spacing: .2px;
      text-align: center;
      margin-top: 4px;
      margin-bottom: 4px;
      width: 100%;
    }
    .label-address {
      position: absolute;
      top: 8px;
      right: 12px;
      text-align: right;
      font-size: .95rem;
      font-weight: 700;
      line-height: 1.1;
      color: #222;
    }
    .label-address .street,
    .label-address .phone {
      display: block;
      white-space: nowrap;
    }
    .label-address .street {
      margin-bottom: 2px;
    }

    /* Coloured destination top-bar */
    .label-topbar {
      position: relative;
      z-index: 1;
      height: 32px;
      min-height: 32px;
      background: var(--dest-color, #b71c1c);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .label-topbar span {
      color: #fff;
      font-weight: 900;
      font-size: .95rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Label body */
    .label-body {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 18px 14px 8px;
      gap: 2px;
    }

    .label-name {
      font-size: 1.35rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .5px;
      line-height: 1.1;
      margin-bottom: 8px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .label-row {
      font-size: 1.15rem;
      font-weight: 700;
      color: #222;
      display: flex;
      gap: 6px;
      line-height: 1.05;
      border-bottom: 1px solid #222;
      padding-bottom: 4px;
      margin-bottom: 4px;
    }
    .label-row .lbl { color: #555; font-weight: 400; min-width: 122px; }
    .label-row.booking-row { font-size: 1rem; font-weight: 700; color: #111; }
    .label-row.booking-row .lbl,
    .label-row.booking-row span:last-child { font-weight: 700; color: #111; }

    /* Big box number at bottom — editable */
    .label-boxnum {
      margin-top: auto;
      padding-top: 4px;
      padding-bottom: 6px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
      color: #111;
      cursor: text;
      border-radius: 0;
      transition: background .15s;
      min-height: 2.5rem;
    }
    .label-boxnum:focus {
      outline: 2px dashed #1b3a6b;
      background: rgba(27,58,107,.06);
    }
    .label-boxnum:empty::before {
      content: 'SKRIV KASSENO.';
      color: #bbb;
      font-size: 1.4rem;
      letter-spacing: 1px;
    }

    /* ── Destination colour map ───────────────────────────── */
    /* Colours assigned dynamically in JS */

    /* ── Empty state ──────────────────────────────────────── */
    #empty-msg {
      text-align: center;
      color: #999;
      font-size: 1rem;
      padding: 48px 0 80px;
    }

    /* Keep old cached button hidden if it still exists in stale markup */
    #btn-generate { display: none !important; }

    /* Compact app view: labels are generated off-screen for print/PDF only */
    #label-area {
      position: absolute;
      left: -200vw;
      top: 0;
      width: 210mm;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6mm;
      padding: 0;
      margin: 0;
    }

    /* Compact layout used by html2canvas during PDF export */
    body.pdf-mode .label {
      border: 2pt solid #111;
    }
    body.pdf-mode .label-header { padding: 6px 10px 4px; }
    body.pdf-mode .label-logo { width: 88px; }
    body.pdf-mode .label-header-left { padding-bottom: 6px; }
    body.pdf-mode .label-booking-header { font-size: 1.3rem; margin-top: 3px; margin-bottom: 3px; padding-bottom: 4px; }
    body.pdf-mode .label-address { font-size: .72rem; }
    body.pdf-mode .label-topbar { height: 22px; min-height: 22px; }
    body.pdf-mode .label-topbar span { font-size: .7rem; }
    body.pdf-mode .label-body { padding: 12px 10px 6px; }
    body.pdf-mode .label-name { font-size: 1rem; margin-bottom: 4px; }
    body.pdf-mode .label-row { font-size: .82rem; padding-bottom: 2px; margin-bottom: 2px; }
    body.pdf-mode .label-row .lbl { min-width: 96px; }
    body.pdf-mode .label-boxnum {
      font-size: 1.05rem;
      min-height: 1.8rem;
      line-height: 1;
      padding-top: 2px;
      padding-bottom: 2px;
    }

    /* ══════════════════════════════════════════════════════
       PRINT STYLES
    ══════════════════════════════════════════════════════ */
    @media print {
      @page { size: A4 portrait; margin: 10mm; }

      body * { visibility: hidden; }

      #label-area,
      #label-area * { visibility: visible; }

      #label-area {
        position: absolute;
        top: 0; left: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6mm;
        padding: 0;
        margin: 0;
        width: 100%;
      }

      .label {
        width: 100%;
        aspect-ratio: 15 / 10;
        border: 2pt solid #111;
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .label-header { padding: 6px 10px 4px; }
      .label-logo { width: 88px; }
      .label-header-left { padding-bottom: 6px; }
      .label-booking-header { font-size: 1.3rem; margin-top: 3px; margin-bottom: 3px; padding-bottom: 4px; }
      .label-address { font-size: .72rem; }
      .label-topbar { height: 22px; min-height: 22px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .label-topbar span { font-size: .7rem; }
      .label-name { font-size: 1rem; }
      .label-row { font-size: .82rem; padding-bottom: 2px; margin-bottom: 2px; }
      .label-boxnum { font-size: 1.1rem; }
      .label-bg { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>&#128230; Flyttegods Label Maskine</h1>
  </div>
  <span>Usisaat Shipping</span>
</header>

<div id="pwa-install-gate" aria-live="polite">
  <div class="pwa-card">
    <h3>Installer Label Maskine som app</h3>
    <p>Denne løsning er lavet til PWA arbejdsskærm. Installer appen og åbn den derefter fra Start-menuen for fuldskærm uden browser-felter.</p>
    <div class="pwa-actions">
      <button id="btn-install-pwa" type="button">Installer app</button>
      <button id="btn-install-help" type="button">Vis trin</button>
    </div>
  </div>
</div>

<!-- ── Input panel ── -->
<div class="panel" id="input-panel">
  <h2>Udfyld oplysninger</h2>
  <div class="form-grid">

    <div>
      <label for="inp-navn">Navn</label>
      <input type="text" id="inp-navn" placeholder="Fulde navn" />
    </div>

    <div>
      <label for="inp-rekv">Rekvisitionsnummer</label>
      <input type="text" id="inp-rekv" placeholder="REK-XXXX" />
    </div>

    <div>
      <label for="inp-book">Bookingnummer</label>
      <input type="text" id="inp-book" placeholder="BK-XXXXXXXX" />
    </div>

    <div>
      <label for="inp-dest">Destination</label>
      <input type="text" id="inp-dest" placeholder="fx Nuuk, Sisimiut …" />
    </div>

    <div class="full">
      <label for="inp-antal">Antal kasser <span style="font-weight:400;text-transform:none;color:#888">(valgfrit — lad stå tomt for at skrive kasseno. selv)</span></label>
      <input type="number" id="inp-antal" placeholder="fx 5 — eller lad stå tomt" min="1" max="100" />
    </div>

  </div>

  <div class="btn-row">
    <button id="btn-mail">&#9993; Send mail</button>
    <button id="btn-pdf">&#128196; Download PDF</button>
    <button id="btn-clear">&#10005; Ryd</button>
  </div>
</div>

<!-- ── Label output area ── -->
<div id="label-area"></div>

<script src="html2canvas.min.js"></script>
<script src="jspdf.umd.min.js"></script>
<script>
  let deferredPwaPrompt = null;

  function isHttpOrigin() {
    return location.protocol === 'http:' || location.protocol === 'https:';
  }

  function ensureManifestLink() {
    if (!isHttpOrigin()) return;
    if (document.querySelector('link[rel="manifest"]')) return;

    const href = document.querySelector('meta[name="app-manifest"]')?.getAttribute('content') || 'manifest.webmanifest';
    const manifestLink = document.createElement('link');
    manifestLink.rel = 'manifest';
    manifestLink.href = href;
    document.head.appendChild(manifestLink);
  }

  function isStandaloneApp() {
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }

  function showInstallGate() {
    const gate = document.getElementById('pwa-install-gate');
    if (gate) gate.classList.add('show');
  }

  function hideInstallGate() {
    const gate = document.getElementById('pwa-install-gate');
    if (gate) gate.classList.remove('show');
  }

  async function registerServiceWorkerWithAutoUpdate() {
    if (!isHttpOrigin() || !window.isSecureContext || !('serviceWorker' in navigator)) return;

    let isRefreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (isRefreshing) return;
      isRefreshing = true;
      window.location.reload();
    });

    try {
      const registration = await navigator.serviceWorker.register('./sw.js');

      if (registration.waiting) {
        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
      }

      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        if (!newWorker) return;

        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            newWorker.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });

      await registration.update();
      setInterval(() => {
        registration.update().catch(() => {});
      }, 5 * 60 * 1000);
    } catch (err) {
      console.error('Service worker fejl:', err);
    }
  }

  async function setupPwa() {
    ensureManifestLink();

    if (location.protocol === 'file:') {
      alert('Du har aabnet appen som fil (file://), og PWA virker derfor ikke. Brug start-label-maskine.cmd eller aabn appen via http://localhost:5173/index.html.');
      return;
    }

    await registerServiceWorkerWithAutoUpdate();

    if (isStandaloneApp()) {
      document.documentElement.classList.add('standalone-root');
      document.body.classList.add('standalone');
      hideInstallGate();
      return;
    }

    const installBtn = document.getElementById('btn-install-pwa');
    const helpBtn = document.getElementById('btn-install-help');

    if (installBtn) {
      installBtn.addEventListener('click', async () => {
        if (!deferredPwaPrompt) {
          alert('Installationsprompt er ikke klar endnu. Tryk på "Vis trin".');
          return;
        }

        deferredPwaPrompt.prompt();
        await deferredPwaPrompt.userChoice;
        deferredPwaPrompt = null;
      });
    }

    if (helpBtn) {
      helpBtn.addEventListener('click', () => {
        alert('Edge: klik på menuen (...) > Apps > Installer denne side som en app. Åbn derefter appen fra Start-menuen.');
      });
    }

    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      deferredPwaPrompt = event;
      showInstallGate();
    });

    window.addEventListener('appinstalled', () => {
      hideInstallGate();
      deferredPwaPrompt = null;
      alert('App installeret. Åbn den nu fra Start-menuen.');
    });

  }

  setupPwa();

  /* ── Destination → colour mapping ─────────────────────── */
  const DEST_COLORS = [
    { keys: ['nuuk','godthåb','godthab'],   color: '#b71c1c' },   // deep red
    { keys: ['sisimiut','holsteinsborg'],   color: '#1565c0' },   // blue
    { keys: ['ilulissat','jakobshavn'],     color: '#2e7d32' },   // green
    { keys: ['qaqortoq','julianehåb'],     color: '#6a1a9a' },   // purple
    { keys: ['aasiaat','egedesminde'],      color: '#e65100' },   // orange
    { keys: ['maniitsoq','sukkertoppen'],   color: '#5b9bd5' },   // light blue
    { keys: ['tasiilaq','ammassalik'],      color: '#37474f' },   // dark grey
    { keys: ['kangerlussuaq','søndre strømfjord'], color: '#4527a0' }, // indigo
    { keys: ['paamiut','frederikshåb'],     color: '#558b2f' },   // olive
    { keys: ['uummannaq'],                  color: '#c62828' },   // crimson
    { keys: ['upernavik'],                  color: '#0277bd' },   // sky blue
    { keys: ['narsaq'],                     color: '#ad1457' },   // pink
  ];

  const FALLBACK_COLOR = '#37474f';

  function destColor(destination) {
    if (!destination) return FALLBACK_COLOR;
    const lower = destination.toLowerCase().trim();
    for (const entry of DEST_COLORS) {
      if (entry.keys.some(k => lower.includes(k))) return entry.color;
    }
    /* Hash the string to a consistent colour for unknown destinations */
    let hash = 0;
    for (let i = 0; i < lower.length; i++) hash = lower.charCodeAt(i) + ((hash << 5) - hash);
    const hue = Math.abs(hash) % 360;
    return `hsl(${hue}, 55%, 35%)`;
  }

  /* ── Helpers ──────────────────────────────────────────── */
  function val(id) { return document.getElementById(id).value.trim(); }

  function safeFilenamePart(text) {
    const cleaned = (text || '').trim().replace(/[\\/:*?"<>|]/g, '-');
    return cleaned || 'uden-booking';
  }

  function openOutlookDraft() {
    const navn = (val('inp-navn') || 'navn').replace(/"/g, '');
    const rekv = val('inp-rekv') || 'Rekvisition nr';
    const subject = `${navn} - ${rekv} - Label:`;

    const body = [
      `Hej ${navn},`,
      '',
      'I forbindelse med din flytning vil vi venligst gøre opmærksom på, at det er meget vigtigt, at du udskriver de labels, du har modtaget, og sætter dem på samtlige flyttekasser.',
      'Labelen skal tapes godt fast og placeres synligt på hver enkelt kasse.',
      'Korrekt mærkning er afgørende for, at dit gods bliver håndteret rigtigt under transporten, og for at undgå forsinkelser eller fejlsortering til forkert destination.',
      '',
      'Vi anbefaler derfor følgende:',
      '',
      'At alle kasser er tydeligt mærket med label',
      'At labelen placeres, så den er let at se',
      'At der anvendes tape, så labelen ikke falder af under transport',
      '',
      'Manglende eller utydelig mærkning kan medføre forsinkelser eller fejl i leveringen.',
      'Har du spørgsmål, er du altid velkommen til at kontakte os.',
      '',
      'Med venlig hilsen'
    ].join('\n');

    const mailtoUrl = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.location.href = mailtoUrl;
  }

  async function exportLabelsToPdf() {
    if (typeof html2canvas !== 'function' || !window.jspdf || !window.jspdf.jsPDF) {
      alert('PDF-biblioteker blev ikke indlæst. Genindlæs siden og prøv igen.');
      return false;
    }

    const labels = Array.from(document.querySelectorAll('.label'));
    if (!labels.length) {
      alert('Der er ingen labels at eksportere.');
      return false;
    }

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const pageW = 210;
    const pageH = 297;
    const margin = 8;
    const gapX = 4;
    const gapY = 6;
    const cols = 1;
    const maxRowsPerPage = 2;
    const perPage = cols * maxRowsPerPage;

    const usableW = pageW - margin * 2;
    const usableH = pageH - margin * 2;
    const aspect = 15 / 10;

    document.body.classList.add('pdf-mode');
    try {
      for (let i = 0; i < labels.length; i++) {
        if (i > 0 && i % perPage === 0) {
          pdf.addPage();
        }

        const pageStart = Math.floor(i / perPage) * perPage;
        const labelsOnPage = Math.min(perPage, labels.length - pageStart);
        const rowsOnPage = Math.max(1, Math.ceil(labelsOnPage / cols));

        const cellWByWidth = (usableW - gapX * (cols - 1)) / cols;
        const cellHByHeight = (usableH - gapY * (rowsOnPage - 1)) / rowsOnPage;
        const cellW = Math.min(cellWByWidth, cellHByHeight * aspect);
        const cellH = cellW / aspect;

        const gridW = cols * cellW + gapX * (cols - 1);
        const gridH = rowsOnPage * cellH + gapY * (rowsOnPage - 1);
        const startX = (pageW - gridW) / 2;
        const startY = (pageH - gridH) / 2;

        const indexOnPage = i % perPage;
        const row = Math.floor(indexOnPage / cols);
        const col = indexOnPage % cols;
        const x = startX + col * (cellW + gapX);
        const y = startY + row * (cellH + gapY);

        const canvas = await html2canvas(labels[i], {
          scale: 2,
          allowTaint: true,
          backgroundColor: '#ffffff',
          logging: false,
          useCORS: false
        });

        const imgData = canvas.toDataURL('image/png');
        pdf.addImage(imgData, 'PNG', x, y, cellW, cellH);
      }

      const today = new Date().toISOString().slice(0, 10);
      const booking = safeFilenamePart(val('inp-book'));
      const filename = `labels-${booking}-${today}.pdf`;
      pdf.save(filename);
      return true;
    } finally {
      document.body.classList.remove('pdf-mode');
    }
  }

  function buildLabel(navn, rekv, book, dest, kassNr, kassTotal, color) {
    const div = document.createElement('div');
    div.className = 'label';

    div.innerHTML = `
      <div class="label-topbar" style="background:#1b3a6b">
        <span>${dest || 'DESTINATION UKENDT'}</span>
      </div>

      <div class="label-header">
        <div class="label-header-left">
          <img class="label-logo" src="${LOGO_PATH}" alt="Usisaat logo" />
          <div class="label-booking-header">${book || '—'}</div>
        </div>
        <div class="label-address">
          <span class="street">Qeqertanut 1, 3900 Nuuk</span>
          <span class="phone">Telefon 320333</span>
        </div>
      </div>

      <div class="label-body">
        <div class="label-name">${navn || '—'}</div>

        <div class="label-row">
          <span class="lbl">Rekvisition:</span>
          <span>${rekv || '—'}</span>
        </div>

        <div class="label-boxnum" contenteditable="true" spellcheck="false">${kassNr ? kassNr + '&nbsp;UD AF&nbsp;' + kassTotal : '________ UD AF ________'}</div>
      </div>
    `;
    return div;
  }

  /* ── Generate ─────────────────────────────────────────── */
  function generateLabels() {
    const navn  = val('inp-navn');
    const rekv  = val('inp-rekv');
    const book  = val('inp-book');
    const dest  = val('inp-dest');
    const antalRaw = document.getElementById('inp-antal').value.trim();
    const antal = antalRaw === '' ? 0 : parseInt(antalRaw, 10);

    if (antalRaw !== '' && (isNaN(antal) || antal < 1)) {
      alert('Antal kasser skal være mindst 1, eller lad feltet stå tomt.');
      return false;
    }
    if (antal > 100) {
      alert('Maks 100 kasser pr. generering.');
      return false;
    }

    const color = destColor(dest);
    const area  = document.getElementById('label-area');
    area.innerHTML = '';               // clear previous

    if (antal === 0) {
      /* Ingen antal angivet -> 2 labels med "__ UD AF __" som redigerbart felt */
      area.appendChild(buildLabel(navn, rekv, book, dest, null, null, color));
      area.appendChild(buildLabel(navn, rekv, book, dest, null, null, color));
    } else {
      for (let i = 1; i <= antal; i++) {
        area.appendChild(buildLabel(navn, rekv, book, dest, i, antal, color));
        area.appendChild(buildLabel(navn, rekv, book, dest, i, antal, color));
      }
    }

    return true;
  }

  /* ── Send mail ────────────────────────────────────────── */
  document.getElementById('btn-mail').addEventListener('click', () => {
    openOutlookDraft();
  });

  /* ── PDF download ────────────────────────────────────── */
  document.getElementById('btn-pdf').addEventListener('click', async () => {
    if (!generateLabels()) return;

    const btn = document.getElementById('btn-pdf');
    btn.disabled = true;
    const oldText = btn.textContent;
    btn.textContent = 'Genererer PDF...';

    try {
      await exportLabelsToPdf();
    } catch (err) {
      console.error(err);
      alert('Der opstod en fejl under PDF-generering. Prøv igen.');
    } finally {
      btn.textContent = oldText;
      btn.disabled = false;
    }
  });

  /* ── Clear ────────────────────────────────────────────── */
  document.getElementById('btn-clear').addEventListener('click', () => {
    ['inp-navn','inp-rekv','inp-book','inp-dest','inp-antal'].forEach(id => {
      document.getElementById(id).value = '';
    });
    const area = document.getElementById('label-area');
    area.innerHTML = '';
  });

  /* ── Live update on Enter key ─────────────────────────── */
  document.getElementById('inp-antal').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateLabels();
  });
</script>
</body>
</html>
